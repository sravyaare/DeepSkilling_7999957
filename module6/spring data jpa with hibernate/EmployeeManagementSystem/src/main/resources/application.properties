spring.application.name=EmployeeManagementSystem

# Primary DataSource
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate Properties
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=5
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Secondary DataSource
secondary.datasource.url=jdbc:h2:mem:departmentdb
secondary.datasource.username=sa
secondary.datasource.password=
secondary.datasource.driver-class-name=org.h2.Driver