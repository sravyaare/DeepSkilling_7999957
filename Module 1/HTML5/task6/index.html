<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Feedback Handling</title>

    <style>

        body{

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;
        }

        .container{

            width: 500px;

            margin: 30px auto;

            background-color: white;

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px gray;
        }
        input,
        select,
        textarea{

            width: 90%;

            padding: 10px;

            margin-top: 10px;

            margin-bottom: 15px;

            border-radius: 5px;

            border: 1px solid gray;
        }

        button{

            padding: 10px 20px;

            background-color: #2b6cb0;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;
        }

        button:hover{

            background-color: #1e4f80;
        }

        img{

            width: 250px;

            border-radius: 10px;

            border: 3px solid black;

            margin-top: 20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Event Feedback Form</h1>
        <!-- onblur -->

        <input type="text"
               id="phone"
               placeholder="Enter Phone Number"
               onblur="validatePhone()">

        <!-- onchange -->

        <select onchange="showFee(this.value)">

            <option value="">
                Select Event
            </option>

            <option value="100">
                Music Festival
            </option>

            <option value="200">
                Sports Event
            </option>

            <option value="300">
                Art Exhibition
            </option>

        </select>
        <p id="feeDisplay"></p>

        <!-- keyboard event -->

        <textarea id="feedback"
                  rows="5"
                  placeholder="Enter Feedback"
                  onkeyup="countCharacters()"></textarea>

        <p id="charCount">

            Characters: 0

        </p>

        <!-- onclick -->

        <button onclick="showConfirmation()">

            Submit Feedback
        </button>

        <!-- ondblclick -->

        <h2>Double Click Image to Enlarge</h2>

        <img src="images/event.jpg"
             id="eventImage"
             ondblclick="enlargeImage()">

    </div>

    <script>
        // onblur validation

        function validatePhone(){

            let phone =

            document.getElementById("phone").value;
            if(phone.length != 10){

                alert("Enter valid 10 digit phone number");
            }
        }
        // onchange fee display

        function showFee(fee){

            document.getElementById("feeDisplay").innerHTML =

            "Selected Event Fee: ₹" + fee;
        }
        // onclick confirmation

        function showConfirmation(){

            alert("Feedback Submitted Successfully");
        }
        // ondblclick image enlarge

        function enlargeImage(){

            document.getElementById("eventImage")
            .style.width = "500px";
        }
        // keyboard event character count

        function countCharacters(){

            let count =

            document.getElementById("feedback")
            .value.length;
            document.getElementById("charCount").innerHTML =

            "Characters: " + count;
        }

    </script>

</body>

</html>
