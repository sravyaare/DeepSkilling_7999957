<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Geolocation Event Mapping</title>

    <style>

        body{

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;
        }

        .container{

            width: 500px;

            margin: 50px auto;

            background-color: white;

            padding: 25px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px gray;
        }

        h1{

            color: #2b6cb0;
        }

        button{

            padding: 12px 20px;

            background-color: #2b6cb0;

            color: white;

            border: none;

            border-radius: 5px;

            font-size: 16px;

            cursor: pointer;
        }

        button:hover{

            background-color: #1e4f80;
        }

        #location{

            margin-top: 20px;

            font-weight: bold;

            color: green;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Find Nearby Events</h1>

        <!-- Geolocation Button -->

        <button onclick="findLocation()">

            Find Nearby Events

        </button>

        <!-- Location Display -->

        <p id="location"></p>

    </div>

    <script>

        function findLocation(){

            // Check browser support

            if(navigator.geolocation){

                navigator.geolocation.getCurrentPosition(

                    showPosition,

                    showError,
                    {

                        enableHighAccuracy: true,

                        timeout: 5000,

                        maximumAge: 0

                    }

                );

            }

            else{

                document.getElementById("location").innerHTML =

                "Geolocation is not supported by this browser.";
            }
        }

        // Display coordinates

        function showPosition(position){

            document.getElementById("location").innerHTML =

            "Latitude: " +

            position.coords.latitude +

            "<br><br>Longitude: " +

            position.coords.longitude;
        }
        // Error handling

        function showError(error){

            switch(error.code){

                case error.PERMISSION_DENIED:

                    document.getElementById("location").innerHTML =

                    "Location access denied by user.";

                    break;

                case error.POSITION_UNAVAILABLE:

                    document.getElementById("location").innerHTML =

                    "Location information unavailable.";

                    break;

                case error.TIMEOUT:

                    document.getElementById("location").innerHTML =

                    "Location request timed out.";

                    break;

                default:

                    document.getElementById("location").innerHTML =

                    "An unknown error occurred.";
            }
        }

    </script>

</body>

</html>
