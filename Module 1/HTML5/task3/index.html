<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Welcome Banner Task</title>

    <!-- Internal CSS -->

    <style>

        #welcomeBanner{

            background-color: #2b6cb0;

            color: white;

            padding: 20px;

            text-align: center;

            border-radius: 10px;

            margin: 20px;
        }

        .highlight{

            background-color: yellow;

            color: black;

            font-weight: bold;

            padding: 5px;
        }

    </style>

</head>

<body>

    <!-- Welcome Banner Section -->

    <div id="welcomeBanner">

        <h1>
            Welcome to Community Connect Portal
        </h1>

        <p class="highlight">

            Logged-in users can access special
            community events and activities.

        </p>

        <p>

            <span style="color:red; font-weight:bold;">

                Special Offer:

            </span>

            Free entry for the first 50 registrations.

        </p>

    </div>

</body>

</html>
