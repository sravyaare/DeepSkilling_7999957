<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Event Promo Video</title>

    <style>

        body{

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;
        }


        .container{

            width: 700px;

            margin: 40px auto;

            background-color: white;

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px gray;
        }

        h1{

            color: #2b6cb0;
        }

        video{

            border: 4px solid black;

            border-radius: 10px;
        }

        #videoMessage{

            color: green;

            font-weight: bold;

            margin-top: 15px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Community Event Promo Video</h1>

        <video width="600"
               controls
               oncanplay="videoReady()">

            <source src="videos/promo.mp4"
                    type="video/mp4">

        </video>

        <p id="videoMessage"></p>

    </div>

    <script>

        // oncanplay event

        function videoReady(){

            document.getElementById("videoMessage")
            .innerHTML =

            "Video ready to play";
        }

        // onbeforeunload event

        window.onbeforeunload = function(){

            return "You have unsaved changes.";
        };

    </script>

</body>

</html>
