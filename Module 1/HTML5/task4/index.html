<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Community Event Gallery</title>



    <style>

        body{

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;
        }



        table{

            margin: auto;

            border-spacing: 20px;
        }



        .galleryImage{

            width: 220px;

            height: 150px;

            border: 4px solid black;

            border-radius: 10px;
        }



        caption{

            font-size: 28px;

            font-weight: bold;

            margin-bottom: 20px;
        }

    </style>

</head>

<body>



    <table>

        <caption>
            Community Event Gallery
        </caption>



        <!-- Row 1 -->

        <tr>

            <td>

                <img src="images/event1.jpg"
                     alt="Music Festival"
                     title="Music Festival"
                     class="galleryImage">

                <p>Music Festival</p>

            </td>



            <td>

                <img src="images/event2.jpg"
                     alt="Food Carnival"
                     title="Food Carnival"
                     class="galleryImage">

                <p>Food Carnival</p>

            </td>



            <td>

                <img src="images/event3.jpg"
                     alt="Dance Competition"
                     title="Dance Competition"
                     class="galleryImage">

                <p>Dance Competition</p>

            </td>

        </tr>



        <!-- Row 2 -->

        <tr>

            <td>

                <img src="images/event4.jpg"
                     alt="Sports Day"
                     title="Sports Day"
                     class="galleryImage">

                <p>Sports Day</p>

            </td>



            <td>

                <img src="images/event5.jpg"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="galleryImage">

                <p>Art Exhibition</p>

            </td>



            <td>

                <img src="images/event6.jpg"
                     alt="Book Fair"
                     title="Book Fair"
                     class="galleryImage">

                <p>Book Fair</p>

            </td>

        </tr>

    </table>



</body>

</html>
