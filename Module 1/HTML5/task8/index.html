<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Saving User Preferences</title>
    <style>

        body{

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;
        }
        .container{

            width: 450px;

            margin: 50px auto;

            background-color: white;

            padding: 25px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px gray;
        }
        h1{

            color: #2b6cb0;
        }
        select{

            width: 80%;

            padding: 10px;

            margin-top: 20px;

            border-radius: 5px;

            border: 1px solid gray;
        }
        button{

            margin-top: 20px;

            padding: 10px 20px;

            background-color: #2b6cb0;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;
        }

        button:hover{

            background-color: #1e4f80;
        }

        p{

            margin-top: 20px;

            font-weight: bold;

            color: green;
        }

    </style>

</head>

<body>
    <div class="container">

        <h1>Preferred Event Selection</h1>
        <!-- Event Dropdown -->

        <select id="eventType"
                onchange="savePreference()">

            <option value="">
                Select Event Type
            </option>

            <option value="Music Festival">
                Music Festival
            </option>

            <option value="Sports Event">
                Sports Event
            </option>

            <option value="Art Exhibition">
                Art Exhibition
            </option>

            <option value="Food Carnival">
                Food Carnival
            </option>

        </select>

        <p id="message"></p>

        <!-- Clear Button -->

        <button onclick="clearPreferences()">

            Clear Preferences

        </button>

    </div>

    <script>
        // Save selected event

        function savePreference(){

            let selectedEvent =

            document.getElementById("eventType").value;

            // localStorage

            localStorage.setItem(

                "preferredEvent",

                selectedEvent
            );
            // sessionStorage

            sessionStorage.setItem(

                "sessionEvent",

                selectedEvent
            );
            document.getElementById("message").innerHTML =

            "Preference Saved Successfully";
        }
        // Load saved preference
        function loadPreference(){

            let savedEvent =

            localStorage.getItem("preferredEvent");
            if(savedEvent){

                document.getElementById("eventType").value =

                savedEvent;
                document.getElementById("message").innerHTML =

                "Previously Selected Event Loaded";
            }
        }
        // Clear storage
        function clearPreferences(){

            localStorage.clear();

            sessionStorage.clear();

            document.getElementById("message").innerHTML =
            "Preferences Cleared";
            document.getElementById("eventType").value = "";
        }

        // Load when page opens

        window.onload = loadPreference;

    </script>

</body>

</html>
