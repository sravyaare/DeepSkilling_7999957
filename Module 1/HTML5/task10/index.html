<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Chrome DevTools Debugging</title>

    <style>

        body{

            font-family: Arial;

            background-color: #f4f4f4;

            text-align: center;
        }

        .container{

            width: 500px;

            margin: 50px auto;

            background-color: white;

            padding: 25px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px gray;
        }

        h1{

            color: #2b6cb0;
        }

        button{

            padding: 10px 20px;

            background-color: #2b6cb0;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;
        }

        button:hover{

            background-color: #1e4f80;
        }

        #result{

            margin-top: 20px;

            font-size: 20px;

            color: green;

            font-weight: bold;
        }

    </style>

</head>

<body>
    <div class="container">

        <h1>Debugging Practice Page</h1>

        <p>
            Click the button to calculate total event cost.
        </p>
        <button onclick="calculateCost()">

            Calculate Cost

        </button>
        <p id="result"></p>

    </div>

    <script>
        function calculateCost(){

            let ticketPrice = 200;

            let numberOfTickets = 3;

            console.log("Ticket Price:", ticketPrice);

            console.log("Number of Tickets:", numberOfTickets);
            let totalCost =

            ticketPrice * numberOfTickets;

            console.log("Total Cost:", totalCost);
            document.getElementById("result").innerHTML =

            "Total Event Cost: ₹" + totalCost;
        }
    </script>

</body>

</html>
