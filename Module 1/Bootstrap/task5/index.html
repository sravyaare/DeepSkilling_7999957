<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alignment and Reordering in Grid</title>

    <link rel="stylesheet"
          href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <!-- Exercise 5.1 -->

    <h2 class="text-center text-primary mb-4">
        Exercise 5.1 - Alignment in Grid
    </h2>

    <div class="row justify-content-center align-items-center bg-light"
         style="height:250px;">

        <div class="col-md-4">
            <div class="bg-primary text-white p-4 text-center rounded">
                Centered Content
            </div>
        </div>

    </div>

    <!-- Exercise 5.2 -->

    <h2 class="text-center text-success mt-5 mb-4">
        Exercise 5.2 - Reordering Columns
    </h2>

    <div class="row">

        <!-- Appears First on Mobile, Second on Desktop -->

        <div class="col-md-6 order-md-2">
            <div class="bg-warning p-4 rounded text-center">
                <h4>Image Section</h4>
                <p>
                    This moves to the right on medium and larger screens.
                </p>
            </div>
        </div>

        <!-- Appears Second on Mobile, First on Desktop -->

        <div class="col-md-6 order-md-1">
            <div class="bg-info text-white p-4 rounded text-center">
                <h4>Content Section</h4>
                <p>
                    This moves to the left on medium and larger screens.
                </p>
            </div>
        </div>

    </div>

</div>

<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
