<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Colors and Backgrounds</title>

    <link rel="stylesheet"
          href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">

    <!-- Exercise 13.1 -->

    <h2 class="text-center text-primary mb-4">
        Dashboard Using Contextual Background Classes
    </h2>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="bg-primary text-white p-4 rounded text-center">
                <h4>Users</h4>
                <h2>1,250</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-success text-white p-4 rounded text-center">
                <h4>Sales</h4>
                <h2>850</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-warning text-dark p-4 rounded text-center">
                <h4>Orders</h4>
                <h2>420</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="bg-danger text-white p-4 rounded text-center">
                <h4>Revenue</h4>
                <h2>₹75K</h2>
            </div>
        </div>

    </div>

    <!-- Exercise 13.2 -->

    <h2 class="text-center text-success mt-5 mb-4">
        Gradient Background Section
    </h2>

    <div class="bg-dark bg-gradient text-white p-5 rounded text-center shadow">

        <h3>
            Welcome to Bootstrap Dashboard
        </h3>

        <p class="lead">
            This section uses bg-dark, bg-gradient and white text.
        </p>

        <button class="btn btn-outline-light">
            Explore More
        </button>

    </div>

</div>

<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
