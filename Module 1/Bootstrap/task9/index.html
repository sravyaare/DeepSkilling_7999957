<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Buttons</title>

    <link rel="stylesheet"
          href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">

    <!-- Exercise 9.1 -->

    <h2 class="text-center text-primary mb-4">
        Bootstrap Contextual Buttons
    </h2>

    <div class="card p-4 shadow mb-5">

        <h4 class="mb-3">Solid Buttons</h4>

        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-warning">Warning</button>
        <button class="btn btn-info">Info</button>
        <button class="btn btn-light">Light</button>
        <button class="btn btn-dark">Dark</button>

        <hr>

        <h4 class="mb-3">Outline Buttons</h4>

        <button class="btn btn-outline-primary">Primary</button>
        <button class="btn btn-outline-secondary">Secondary</button>
        <button class="btn btn-outline-success">Success</button>
        <button class="btn btn-outline-danger">Danger</button>
        <button class="btn btn-outline-warning">Warning</button>
        <button class="btn btn-outline-info">Info</button>
        <button class="btn btn-outline-dark">Dark</button>

    </div>

    <!-- Exercise 9.2 -->

    <h2 class="text-center text-success mb-4">
        Button Groups and Toggle Buttons
    </h2>

    <div class="card p-4 shadow">

        <h4 class="mb-3">Button Group</h4>

        <div class="btn-group mb-4">

            <button class="btn btn-primary">
                Home
            </button>

            <button class="btn btn-primary">
                About
            </button>

            <button class="btn btn-primary">
                Contact
            </button>

        </div>

        <hr>

        <h4 class="mb-3">Toggle Buttons</h4>

        <input type="checkbox"
               class="btn-check"
               id="html">

        <label class="btn btn-outline-primary me-2"
               for="html">
            HTML
        </label>

        <input type="checkbox"
               class="btn-check"
               id="css">

        <label class="btn btn-outline-success me-2"
               for="css">
            CSS
        </label>

        <input type="checkbox"
               class="btn-check"
               id="bootstrap">

        <label class="btn btn-outline-danger"
               for="bootstrap">
            Bootstrap
        </label>

    </div>

</div>

<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
