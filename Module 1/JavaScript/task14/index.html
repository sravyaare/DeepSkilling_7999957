<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Portal</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .event-card{
            width: 300px;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        button{
            padding: 8px 12px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <h1>Community Event Portal</h1>

    <div class="event-card" id="eventCard">

        <h3>Music Festival</h3>

        <p>Date: 20 June 2026</p>

        <p>Available Seats: 25</p>

        <button id="registerBtn">
            Register
        </button>

        <button id="hideBtn">
            Hide Event
        </button>

        <button id="showBtn">
            Show Event
        </button>

    </div>

    <p id="message"></p>

    <script src="main.js"></script>

</body>
</html>
